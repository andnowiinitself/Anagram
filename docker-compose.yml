services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: anagram_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  telegram-service:
    build:
      context: ./telegram-service
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./telegram-service/anagram.session:/app/anagram.session
      - ./telegram-service/app:/app/app
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=jdbc:postgresql://db:5432/anagram_db
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=password
      - TELEGRAM_SERVICE_URL=http://telegram-service:8000
    depends_on:
      db:
        condition: service_healthy
      telegram-service:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata: